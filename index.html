<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Biodiverso</title>

<style>
body {
  font-family: Arial;
  background: #f2f7f5;
  text-align: center;
  margin: 0;
}

.hero img {
  width: 100%;
  max-height: 260px;
  object-fit: cover;
}

h1 {
  color: #2e6f5e;
  margin-top: 20px;
}

.search-box {
  margin: 20px auto;
  width: 80%;
  max-width: 600px;
  display: flex;
}

input {
  flex: 1;
  padding: 15px;
  border-radius: 25px 0 0 25px;
  border: 1px solid #ccc;
}

button {
  padding: 15px 20px;
  border: none;
  background: #4CAF90;
  color: white;
  border-radius: 0 25px 25px 0;
  cursor: pointer;
}

.suggestions button {
  margin: 5px;
  padding: 8px 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

.result {
  margin: 30px auto;
  width: 80%;
  max-width: 700px;
  background: white;
  padding: 20px;
  border-radius: 15px;
}
</style>

</head>
<body>

<div class="hero">
<img src="https://raw.githubusercontent.com/aug79-droid/assets/main/gatos-biodiverso.png">
</div>

<h1>Escribe tu duda. Encuentra una respuesta clara.</h1>

<div class="search-box">
<input id="searchInput" placeholder="Escribe aquí tu duda sobre biodiversidad">
<button onclick="buscarRespuesta()">Buscar</button>
</div>

<div class="suggestions">
<button onclick="setPregunta('especie invasora')">¿Qué es una especie invasora?</button>
<button onclick="setPregunta('polinizadores')">¿Por qué son importantes los polinizadores?</button>
<button onclick="setPregunta('greenwashing')">¿Qué es el greenwashing?</button>
<button onclick="setPregunta('restauración ecológica')">¿En qué consiste la restauración ecológica?</button>
</div>

<div id="result" class="result"></div>

<script>

function setPregunta(texto){
  document.getElementById("searchInput").value = texto;
  buscarRespuesta();
}

const knowledgeBase = [
  {
    keywords: ["invasora"],
    question: "¿Qué es una especie invasora?",
    answer: "Una especie invasora es aquella que desplaza a especies nativas y altera el ecosistema."
  },
  {
    keywords: ["polinizador","abejas"],
    question: "¿Por qué son importantes los polinizadores?",
    answer: "Permiten la reproducción de plantas y sostienen ecosistemas."
  },
  {
    keywords: ["greenwashing"],
    question: "¿Qué es el greenwashing?",
    answer: "Es aparentar ser sostenible sin acciones reales."
  },
  {
    keywords: ["restauración"],
    question: "¿En qué consiste la restauración ecológica?",
    answer: "Recuperar ecosistemas degradados con especies autóctonas."
  },
  {
    keywords: ["corredor","conectividad"],
    question: "¿Qué es la conectividad ecológica?",
    answer: "Permite que las especies se muevan entre hábitats."
  },
  {
    keywords: ["luz","lumínica"],
    question: "¿Qué impacto tiene la contaminación lumínica?",
    answer: "Altera el comportamiento de la fauna."
  },
  {
    keywords: ["bioindicador"],
    question: "¿Qué es un bioindicador?",
    answer: "Un organismo que indica la calidad ambiental."
  },
  {
    keywords: ["mejorar biodiversidad"],
    question: "¿Cómo mejorar la biodiversidad?",
    answer: "Usar especies autóctonas y crear hábitats."
  }
];

function buscarRespuesta() {
  const input = document.getElementById("searchInput").value.toLowerCase();

  let resultado = knowledgeBase.find(item =>
    item.keywords.some(keyword => input.includes(keyword))
  );

  const resultBox = document.getElementById("result");

  if (resultado) {
    resultBox.innerHTML = `
      <h3>${resultado.question}</h3>
      <p>${resultado.answer}</p>
    `;
  } else {
    resultBox.innerHTML = `
      <h3>No se ha encontrado respuesta</h3>
      <p>Intenta otra forma de preguntar.</p>
    `;
  }
}

</script>

</body>
</html>
